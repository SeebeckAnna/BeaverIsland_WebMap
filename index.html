<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">

<link rel="stylesheet" href="css/leaflet.css">
<link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
<link rel="stylesheet" href="css/qgis2web.css">
<link rel="stylesheet" href="css/fontawesome-all.min.css">
<style>
.legend {
    position: absolute;
    bottom: 30px;
    right: 10px;
    z-index: 1000;
    background: white;
    padding: 10px 12px;
    border-radius: 6px;
    font-family: sans-serif;
    font-size: 13px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.legend-item {
    display: flex;
    align-items: center;
    margin-bottom: 4px;
}
.legend-line {
    width: 20px;
    height: 0;
    border-top: 3px solid red;
    margin-right: 8px;
}
</style>
<style>
html, body, #map {
    height: 100%;
    width: 100%;
    margin: 0;
    padding: 0;
}
</style>
</head>

<body>

<h1 style="text-align:center; font-family:sans-serif; font-size:28px; margin-top:10px;">
Beaver Island, Michigan
</h1>

<p style="text-align:center; font-family:sans-serif; font-size:16px; margin-bottom:10px; color:gray;">

</p>

<div id="map"></div>
<div class="legend">
    <div class="legend-item">
        <div class="legend-line"></div>
        Alva Cable Trading Post Site Area
    </div>
</div>
<button id="aboutButton" style="position:absolute; bottom:30px; left:10px; z-index:1000; background:white; border:1px solid #ccc; border-radius:6px; padding:6px 12px; font-family:sans-serif; font-size:14px; cursor:pointer;">
About
</button>

<div id="aboutPopup" style="display:none; position:absolute; bottom:70px; left:10px; z-index:999; background:#ffffff; border:1px solid #ccc; padding:12px; width:260px; font-family:sans-serif; font-size:13px; border-radius:8px;">
<strong>Historic Features of Beaver Island</strong>
<p>This map displays historic features based on archival sources.</p>
<p><strong>Data Sources:</strong></p>
<ul>
<li>1849 GLO Map</li>
<li></li>
</ul>
<p style="font-size:11px; color:gray;">Created by Anna Seebeck</p>
</div>

<script src="js/leaflet.js"></script>
<script src="js/L.Control.Layers.Tree.min.js"></script>
<script src="js/leaflet-hash.js"></script>
<script src="data/"></script>
<script src="data/ACTP_boundsmall.json"></script>


<script>
// MAP
var map = L.map('map', {
    zoomControl: true,
    maxZoom: 28,
    minZoom: 1
}).fitBounds([[45.6263,-85.6381],[45.6993,-85.4529]]);

var hash = new L.Hash(map);

// ================= BASEMAPS =================

// SATELLITE (ON)
var layer_ESRISatellite_0 = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

// GLO HISTORIC MAP (OFF by default)
var layer_HistoricImagery_2 = L.tileLayer('HistoricMapTiles/{z}/{x}/{y}.png', {
    minNativeZoom: 9,
    maxNativeZoom: 14,
    opacity: 0.6   // ← THIS is the key fix
});

// ================= DEFAULT =================

map.addLayer(layer_ESRISatellite_0);

// ================= LAYER CONTROL =================

fetch('data/ACTP_boundsmall.json')
  .then(response => response.json())
  .then(data => {

    var layer_boundary = L.geoJson(data, {
        style: {
            color: '#ff0000',
            weight: 3,
            fill: false
        }
    });

    map.addLayer(layer_boundary);

    L.control.layers(
        {"Satellite Imagery": layer_ESRISatellite_0},
        {
            "1849 GLO Map": layer_HistoricImagery_2,
            "Site Boundary": layer_boundary
        },
        {collapsed: true}
    ).addTo(map);

});

// ================= ABOUT BUTTON =================

document.getElementById('aboutButton').onclick = function() {
    var popup = document.getElementById('aboutPopup');
    popup.style.display = (popup.style.display === "block") ? "none" : "block";
};

</script>

</body>
</html>
